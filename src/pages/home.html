<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SESI - Alimentação</title>
    <link rel="icon" href="/img/food-icon.png" type="image/png" />

    <!-- FONTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="../styles/home.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="logo-area">
        <!-- COLOQUE A LOGO SESI AQUI -->
        <img src="/img/sesi-logo.png" class="sesi-logo" />

        <div>
          <h1 class="logo-title">CANTINA SESI</h1>

          <p class="logo-subtitle">Sistema de Pedidos</p>
        </div>
      </div>

      <!-- AÇÕES -->
      <div class="header-actions">
        <div class="user-area">
          <i class="fa-regular fa-user"></i>
          <span id="userName"></span>
        </div>

        <button class="icon-btn" id="themeToggle">
          <i class="fa-regular fa-moon"></i>
        </button>

        <div id="actionButtonArea"></div>

        <button class="icon-btn" id="logoutButton">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>
      </div>
    </header>

    <!-- MAIN -->
    <main class="main">
      <!-- BUSCA -->
      <div class="search-box" id="searchBox">
        <i class="fa-solid fa-magnifying-glass"></i>

        <input type="text" placeholder="Buscar produtos..." />
      </div>

      <!-- TITULO -->
      <h2 class="section-title" id="pageTitle">
        <i class="fa-solid fa-burger"></i>
        <span>CATEGORIAS</span>
        <i class="fa-solid fa-burger"></i>
      </h2>

      <p class="categories-description" id="pageDescription">
        <img src="/img/seta.png" class="subtitle-arrow left-arrow" />
        Escolha através das categorias abaixo e faça seu pedido!
        <img src="/img/seta.png" class="subtitle-arrow" />
      </p>

      <!-- GRID -->
      <section class="categories-grid" id="categoriesGrid">
        <!-- CARD -->
        <div class="category-card" onclick="openCategory('lanches')">
          <img src="/img/lanche.png" />

          <div class="overlay green"></div>
        </div>

        <!-- CARD -->
        <div class="category-card" onclick="openCategory('salgados')">
          <img src="/img/salgados.png" />

          <div class="overlay orange"></div>
        </div>

        <!-- CARD -->
        <div class="category-card" onclick="openCategory('bebidas')">
          <img src="/img/bebidas.png" />

          <div class="overlay lime"></div>
        </div>

        <!-- CARD -->
        <div class="category-card" onclick="openCategory('doces')">
          <img src="/img/doces.png" />

          <div class="overlay red"></div>
        </div>

        <!-- CARD -->
        <div class="category-card" onclick="openCategory('combos')">
          <img src="/img/combos.png" />

          <div class="overlay blue"></div>
        </div>

        <!-- CARD -->
        <div class="category-card" onclick="openCategory('sorvetes')">
          <img src="/img/sorvetes.png" />

          <div class="overlay purple"></div>
        </div>
      </section>

      <!-- PRODUTOS -->
      <section class="products-section" id="productsSection">
        <div class="products-header">
          <button class="back-btn" onclick="backHome()">
            <i class="fa-solid fa-arrow-left"></i>
          </button>

          <h2 id="categoryTitle">Categoria</h2>
        </div>

        <div class="products-grid" id="productsGrid"></div>
      </section>
    </main>

    <!-- OVERLAY -->
    <div class="cart-overlay" id="cartOverlay"></div>

    <!-- CARRINHO -->
    <aside class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <div class="cart-title">
          <i class="fa-solid fa-basket-shopping"></i>
          <h2>MEU CARRINHO</h2>
        </div>

        <button id="closeCart">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <!-- O JS vai preencher aqui -->
      <div class="cart-content" id="cartContent"></div>
    </aside>

    <div class="edit-modal" id="editModal">
        <div class="edit-modal-content">
          <button class="modal-close" id="closeEditModal">
            <i class="fa-solid fa-xmark"></i>
          </button>

          <h2>EDITAR PRODUTO</h2>

          <form class="edit-form">
            <label>Nome do produto</label>
            <input type="text" id="editName" />

            <label>Subcategoria</label>
            <input type="text" id="editSub" />

            <label>Preço</label>
            <input type="number" id="editPrice" step="0.01" />

            <label>Imagem</label>
            <input type="text" id="editImage" />

            <button type="button" id="saveEditBtn">Salvar alterações</button>
          </form>
        </div>
      </div>

    <!-- LOADING -->
    <div class="loading-screen" id="loadingScreen">
      <div class="loader-wrapper">
        <div class="loader-ring"></div>

        <div class="loader-logo">
          <img src="/img/food-icon.png" alt="Logo" />
        </div>
      </div>

      <p class="loading-text">Saindo . . .</p>
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="../js/home.js"></script>
  </body>
</html>
